<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ───────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f4e 50%, #0f172a 100%);
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; outline: none; }
    input, textarea { font-family: inherit; outline: none; }

    /* ── Animated background particles ──────────────── */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-glow span {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: .18; animation: drift 20s infinite alternate ease-in-out;
    }
    .bg-glow span:nth-child(1) { width: 500px; height: 500px; background: #6366f1; top: -10%; left: -5%; }
    .bg-glow span:nth-child(2) { width: 400px; height: 400px; background: #8b5cf6; bottom: -10%; right: -5%; animation-delay: -7s; }
    .bg-glow span:nth-child(3) { width: 300px; height: 300px; background: #06b6d4; top: 40%; left: 50%; animation-delay: -14s; }
    @keyframes drift { to { transform: translate(60px, 40px) scale(1.1); } }

    /* ── Utility ────────────────────────────────────── */
    .container { max-width: 960px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
    .glass {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .hidden { display: none !important; }

    /* ── Auth Screen ────────────────────────────────── */
    #auth-screen {
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    .auth-card {
      width: 100%; max-width: 420px; padding: 40px 36px;
    }
    .auth-card h1 {
      font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 4px;
      background: linear-gradient(135deg, #a5b4fc, #818cf8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .auth-card p.sub { text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 28px; }
    .tab-row { display: flex; gap: 4px; margin-bottom: 24px; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 4px; }
    .tab-btn {
      flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 500;
      background: transparent; color: #94a3b8; transition: all .25s;
    }
    .tab-btn.active { background: rgba(99,102,241,.25); color: #a5b4fc; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: #94a3b8; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 14px; border-radius: 10px; font-size: 14px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0; transition: border-color .2s;
    }
    .form-group input:focus { border-color: #6366f1; }
    .btn-primary {
      width: 100%; padding: 13px; border-radius: 10px; font-size: 15px; font-weight: 600;
      background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
      transition: transform .15s, box-shadow .25s;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(99,102,241,.35); }
    .btn-primary:active { transform: scale(.98); }
    .auth-error {
      margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px;
      background: rgba(244,63,94,.12); color: #fb7185; border: 1px solid rgba(244,63,94,.2);
    }

    /* ── Dashboard ──────────────────────────────────── */
    #dashboard { padding: 24px 0 60px; }
    .top-bar {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      flex-wrap: wrap; margin-bottom: 28px;
    }
    .top-bar h2 {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, #c7d2fe, #a5b4fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .top-right { display: flex; align-items: center; gap: 10px; }
    .search-box {
      display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      transition: border-color .2s;
    }
    .search-box:focus-within { border-color: #6366f1; }
    .search-box svg { width: 16px; height: 16px; color: #64748b; flex-shrink: 0; }
    .search-box input {
      background: none; border: none; color: #e2e8f0; font-size: 13px; width: 160px;
    }
    .search-box input::placeholder { color: #475569; }
    .btn-sm {
      padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
      transition: transform .15s, box-shadow .2s;
    }
    .btn-new { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
    .btn-new:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,.3); }
    .btn-logout { background: rgba(255,255,255,0.06); color: #94a3b8; }
    .btn-logout:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }

    /* ── Notes Grid ─────────────────────────────────── */
    .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .note-card {
      padding: 22px; transition: transform .2s, border-color .25s; cursor: pointer;
      position: relative; overflow: hidden;
    }
    .note-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #06b6d4);
      opacity: 0; transition: opacity .25s;
    }
    .note-card:hover { transform: translateY(-3px); border-color: rgba(99,102,241,.3); }
    .note-card:hover::before { opacity: 1; }
    .note-card h3 {
      font-size: 16px; font-weight: 600; color: #e2e8f0; margin-bottom: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .note-card .preview {
      font-size: 13px; color: #64748b; line-height: 1.5; margin-bottom: 14px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .note-card .meta { font-size: 11px; color: #475569; }
    .note-actions {
      position: absolute; top: 12px; right: 12px; display: flex; gap: 4px;
      opacity: 0; transition: opacity .2s;
    }
    .note-card:hover .note-actions { opacity: 1; }
    .note-actions button {
      width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.06); color: #94a3b8; transition: all .15s;
    }
    .note-actions button:hover { background: rgba(255,255,255,0.12); color: #e2e8f0; }
    .note-actions button.del:hover { background: rgba(244,63,94,.15); color: #fb7185; }
    .note-actions button svg { width: 14px; height: 14px; }

    .empty-state {
      text-align: center; padding: 80px 20px; color: #475569;
    }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; color: #334155; }
    .empty-state p { font-size: 15px; margin-bottom: 6px; }
    .empty-state small { font-size: 13px; color: #334155; }

    /* ── Modal ──────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s; pointer-events: none;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      width: 95%; max-width: 520px; padding: 32px; position: relative;
      transform: translateY(20px) scale(.97); transition: transform .25s;
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal h3 {
      font-size: 20px; font-weight: 700; margin-bottom: 20px;
      background: linear-gradient(135deg, #c7d2fe, #a5b4fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .modal .form-group textarea {
      width: 100%; min-height: 140px; padding: 12px 14px; border-radius: 10px; font-size: 14px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0; resize: vertical; transition: border-color .2s;
    }
    .modal .form-group textarea:focus { border-color: #6366f1; }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel {
      padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 500;
      background: rgba(255,255,255,0.06); color: #94a3b8; transition: all .15s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.1); color: #e2e8f0; }
    .btn-save {
      padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 600;
      background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
      transition: transform .15s, box-shadow .2s;
    }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,.3); }

    /* ── Toast ──────────────────────────────────────── */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 500;
      background: rgba(16,185,129,.15); color: #34d399; border: 1px solid rgba(16,185,129,.2);
      animation: toastIn .3s ease, toastOut .3s ease 2.5s forwards;
    }
    .toast.error { background: rgba(244,63,94,.12); color: #fb7185; border-color: rgba(244,63,94,.2); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(40px); } }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 600px) {
      .auth-card { padding: 28px 20px; }
      .top-bar { flex-direction: column; align-items: stretch; }
      .top-right { justify-content: space-between; }
      .search-box input { width: 120px; }
      .notes-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"><span></span><span></span><span></span></div>
  <div class="toast-container" id="toasts"></div>

  <!-- ═══ AUTH SCREEN ═══ -->
  <div id="auth-screen">
    <div class="auth-card glass">
      <h1>📝 Notes</h1>
      <p class="sub">Secure, shareable notes — built with FastAPI</p>
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" onclick="switchTab('register')">Register</button>
      </div>
      <form id="login-form" onsubmit="return handleLogin(event)">
        <div class="form-group"><label>Email</label><input type="email" id="login-email" required placeholder="you@example.com" /></div>
        <div class="form-group"><label>Password</label><input type="password" id="login-pass" required placeholder="••••••••" /></div>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>
      <form id="register-form" class="hidden" onsubmit="return handleRegister(event)">
        <div class="form-group"><label>Email</label><input type="email" id="reg-email" required placeholder="you@example.com" /></div>
        <div class="form-group"><label>Password (min 8 chars)</label><input type="password" id="reg-pass" required minlength="8" placeholder="••••••••" /></div>
        <button type="submit" class="btn-primary">Create Account</button>
      </form>
      <div id="auth-err" class="auth-error hidden"></div>
    </div>
  </div>

  <!-- ═══ DASHBOARD ═══ -->
  <div id="dashboard" class="container hidden">
    <div class="top-bar">
      <h2>My Notes</h2>
      <div class="top-right">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search notes…" oninput="handleSearch()" />
        </div>
        <button class="btn-sm btn-new" onclick="openNoteModal()">+ New</button>
        <button class="btn-sm btn-logout" onclick="logout()">Logout</button>
      </div>
    </div>
    <div id="notes-list"></div>
  </div>

  <!-- ═══ NOTE MODAL ═══ -->
  <div class="modal-overlay" id="note-modal">
    <div class="modal glass">
      <h3 id="modal-title">New Note</h3>
      <div class="form-group"><label>Title</label><input type="text" id="note-title" maxlength="255" placeholder="Note title" /></div>
      <div class="form-group"><label>Content</label><textarea id="note-content" placeholder="Write something…"></textarea></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal('note-modal')">Cancel</button>
        <button class="btn-save" onclick="saveNote()">Save</button>
      </div>
    </div>
  </div>

  <!-- ═══ SHARE MODAL ═══ -->
  <div class="modal-overlay" id="share-modal">
    <div class="modal glass">
      <h3>Share Note</h3>
      <div class="form-group"><label>Recipient Email</label><input type="email" id="share-email" placeholder="colleague@example.com" /></div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal('share-modal')">Cancel</button>
        <button class="btn-save" onclick="shareNote()">Share</button>
      </div>
    </div>
  </div>

  <script>
    /* ── State ─────────────────────────────────────── */
    const API = window.location.origin;
    let token = localStorage.getItem("token") || "";
    let editingId = null;
    let sharingId = null;

    if (token) showDashboard();

    /* ── Auth ──────────────────────────────────────── */
    function switchTab(tab) {
      document.querySelectorAll(".tab-btn").forEach((b, i) => b.classList.toggle("active", (tab === "login") === (i === 0)));
      document.getElementById("login-form").classList.toggle("hidden", tab !== "login");
      document.getElementById("register-form").classList.toggle("hidden", tab !== "register");
      document.getElementById("auth-err").classList.add("hidden");
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-pass").value;
      try {
        const r = await api("POST", "/login", { email, password }, false);
        if (r.access_token) { token = r.access_token; localStorage.setItem("token", token); showDashboard(); }
        else { showAuthErr(r.message || "Login failed"); }
      } catch (err) { showAuthErr(err.message); }
      return false;
    }

    async function handleRegister(e) {
      e.preventDefault();
      const email = document.getElementById("reg-email").value;
      const password = document.getElementById("reg-pass").value;
      try {
        const r = await api("POST", "/register", { email, password }, false);
        if (r.message) { toast(r.message); switchTab("login"); }
      } catch (err) { showAuthErr(err.message); }
      return false;
    }

    function showAuthErr(msg) {
      const el = document.getElementById("auth-err");
      el.textContent = msg; el.classList.remove("hidden");
    }

    function logout() {
      token = ""; localStorage.removeItem("token");
      document.getElementById("auth-screen").classList.remove("hidden");
      document.getElementById("dashboard").classList.add("hidden");
    }

    /* ── Dashboard ─────────────────────────────────── */
    function showDashboard() {
      document.getElementById("auth-screen").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
      loadNotes();
    }

    let searchTimer;
    function handleSearch() {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadNotes, 300);
    }

    async function loadNotes() {
      const q = document.getElementById("search-input").value.trim();
      try {
        let notes;
        if (q) { notes = await api("GET", `/search?q=${encodeURIComponent(q)}`); }
        else { notes = await api("GET", "/notes?limit=50"); }
        renderNotes(notes);
      } catch { renderNotes([]); }
    }

    function renderNotes(notes) {
      const el = document.getElementById("notes-list");
      if (!notes.length) {
        el.innerHTML = `<div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2z"/><path d="M8 7h8M8 11h8M8 15h4"/></svg>
          <p>No notes yet</p><small>Click "+ New" to create your first note</small>
        </div>`;
        return;
      }
      el.innerHTML = `<div class="notes-grid">${notes.map(n => `
        <div class="note-card glass" onclick="openNoteModal(${n.id}, '${esc(n.title)}', '${esc(n.content)}')">
          <div class="note-actions">
            <button title="Share" onclick="event.stopPropagation(); openShareModal(${n.id})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            </button>
            <button class="del" title="Delete" onclick="event.stopPropagation(); deleteNote(${n.id})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
            </button>
          </div>
          <h3>${esc(n.title)}</h3>
          <div class="preview">${esc(n.content)}</div>
          <div class="meta">${fmtDate(n.updated_at)}</div>
        </div>
      `).join("")}</div>`;
    }

    /* ── Note CRUD ─────────────────────────────────── */
    function openNoteModal(id, title, content) {
      editingId = id || null;
      document.getElementById("modal-title").textContent = id ? "Edit Note" : "New Note";
      document.getElementById("note-title").value = title ? unesc(title) : "";
      document.getElementById("note-content").value = content ? unesc(content) : "";
      openModal("note-modal");
    }

    async function saveNote() {
      const title = document.getElementById("note-title").value.trim();
      const content = document.getElementById("note-content").value.trim();
      if (!title || !content) { toast("Title and content are required", true); return; }
      try {
        if (editingId) { await api("PUT", `/notes/${editingId}`, { title, content }); toast("Note updated"); }
        else { await api("POST", "/notes", { title, content }); toast("Note created"); }
        closeModal("note-modal"); loadNotes();
      } catch (err) { toast(err.message, true); }
    }

    async function deleteNote(id) {
      if (!confirm("Delete this note?")) return;
      try { await api("DELETE", `/notes/${id}`); toast("Note deleted"); loadNotes(); }
      catch (err) { toast(err.message, true); }
    }

    /* ── Share ─────────────────────────────────────── */
    function openShareModal(id) { sharingId = id; document.getElementById("share-email").value = ""; openModal("share-modal"); }

    async function shareNote() {
      const email = document.getElementById("share-email").value.trim();
      if (!email) { toast("Enter an email", true); return; }
      try {
        const r = await api("POST", `/notes/${sharingId}/share`, { share_with_email: email });
        toast(r.message || "Shared"); closeModal("share-modal");
      } catch (err) { toast(err.message, true); }
    }

    /* ── Modal helpers ─────────────────────────────── */
    function openModal(id) { document.getElementById(id).classList.add("open"); }
    function closeModal(id) { document.getElementById(id).classList.remove("open"); }
    document.querySelectorAll(".modal-overlay").forEach(ov => ov.addEventListener("click", e => { if (e.target === ov) ov.classList.remove("open"); }));

    /* ── API helper ────────────────────────────────── */
    async function api(method, path, body, auth = true) {
      const opts = { method, headers: { "Content-Type": "application/json" } };
      if (auth && token) opts.headers["Authorization"] = `Bearer ${token}`;
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch(API + path, opts);
      if (r.status === 204) return {};
      const data = await r.json();
      if (r.status === 401 && auth) { logout(); throw new Error(data.message || "Session expired"); }
      if (!r.ok) throw new Error(data.message || data.detail?.message || JSON.stringify(data.detail) || "Request failed");
      return data;
    }

    /* ── Utilities ─────────────────────────────────── */
    function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
    function unesc(s) { const t = document.createElement("textarea"); t.innerHTML = s; return t.value; }
    function fmtDate(d) { return new Date(d).toLocaleString(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }); }
    function toast(msg, err) {
      const d = document.createElement("div"); d.className = "toast" + (err ? " error" : ""); d.textContent = msg;
      document.getElementById("toasts").appendChild(d); setTimeout(() => d.remove(), 3000);
    }
  </script>
</body>
</html>
